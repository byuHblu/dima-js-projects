<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
</head>
<body>
    <header class="header">
        <div class="content-wrap">
            <h1 class="title">My notes</h1>
    
            <label>
                <input class="input-search" type="text" placeholder="Введите название заметки...">
            </label>
        </div>

        <div class="btns-wrap">
            <div class="login">
                <button class="btn-auth">Вход</button>
                <button class="btn-reg">Регистрация</button>
            </div>

            <button class="logout">Выйти</button>
        </div>
    </header>

    <div>
        <div class="modal">
            <div class="shadow"></div>
    
            <div class="modal-content">
                <h1>Регистрация</h1>
                <input class="login-input" type="text">
                <input class="pass" type="password">
                <input class="pass2" type="password">
                <p class="error-text"></p>
                <button class="btn">Зарегистрироваться</button>
            </div>
        </div>
    
        <div class="modal2">
            <div class="shadow2"></div>
    
            <div class="modal-content">
                <h1>Войти</h1>
                <input class="auth-input" type="text">
                <input class="pass-auth" type="password">
                <p class="error-text2"></p>
                <button class="btn2">Войти</button>
            </div>
        </div>
    
        <div class="settings-wrap">
            <div class="item-container">
                <div class="add-note-btn">Создать заметку</div>
                <div class="item" data-value="active">активные</div>
                <div class="item" data-value="finished">завершенные</div>
                <div class="item" data-value="favorite">избранные</div>
                <div class="item" data-value="deleted">удаленные</div>
            </div>
    
            <div class="right-wrap">
                <div class="not">Заметка создана!</div>
    
                <select name="filter" id="filterList">
                    <div class="filter-container">
                    <option class="sort-item" value="time">по дате новые</option>
                    <option class="sort-item" value="-time">по дате старые</option>
                    <option class="sort-item" value="alph">по алфавиту от А</option>
                    <option class="sort-item" value="-alph">по алфавиту от Я</option>
                </select>
            </div>
        </div>
    
        <div class="modal3">
            <div class="shadow3"></div>
                <div class="note-wrap">
                    <input class="name-note" type="text">
                    <input class="text-note" type="text">
                    <button class="add-note">добавить</button>
                    <p class="error-text3"></p>
                </div>
            </div>
        </div>
    </div>

    <div class="notes-wrap">
    </div>

    <div class="modal4">
        <div class="shadow4"></div>
            <div class="note-wrap">
                <input class="name-note2" type="text">
                <input class="text-note2" type="text">
                <button class="save-note">сохранить</button>
                <p class="error-text4"></p>
            </div>
        </div>
    </div>

    

    <script src="reg.js"></script>
    <script src="auth.js"></script>
    <script src="checkAuth.js"></script>
    <script src="render.js" type="module"></script>
    <script src="createNote.js" type="module"></script>
    <script src="editNote.js" type="module"></script>
    <script src="deleteNote.js" type="module"></script>
</body>
</html>
